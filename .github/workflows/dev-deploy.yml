name: Development Deployment
# Triggering fresh CI/CD test run

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker registry
      uses: docker/login-action@v3
      with:
        registry: registry.pocapi.in
        username: ${{ secrets.REGISTRY_UNAME }}
        password: ${{ secrets.REGISTRY_PWD }}
        
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: registry.pocapi.in/infano.api:dev-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

    - name: Copy docker-compose file
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_SERVER_IP }}
        username: root
        password: ${{ secrets.SSH_SERVER_PWD }}
        port: 22
        source: "docker-compose.dev.yml"
        target: "/data/docker/infano-dev/"

    - name: deploy api to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_SERVER_IP }}
        username: root
        password: ${{ secrets.SSH_SERVER_PWD }}
        port: 22
        script: |
          docker login registry.pocapi.in -u "${{ secrets.REGISTRY_UNAME }}" -p "${{ secrets.REGISTRY_PWD }}"
          docker pull registry.pocapi.in/infano.api:dev-latest
          mkdir -p /data/docker/infano-dev
          cd /data/docker/infano-dev
          
          # No longer creating .env file from secrets (VPS-Managed)
          
          docker compose -f docker-compose.dev.yml up -d