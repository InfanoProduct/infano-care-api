name: Docker Image CI
# Triggering fresh CI/CD test run

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker registry
      uses: docker/login-action@v3
      with:
        registry: registry.pocapi.in
        username: ${{ secrets.REGISTRY_UNAME }}
        password: ${{ secrets.REGISTRY_PWD }}
        
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: registry.pocapi.in/infano.api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: deploy api to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_SERVER_IP }}
        username: root
        password: ${{ secrets.SSH_SERVER_PWD }}
        port: 22
        envs: REGISTRY_UNAME,REGISTRY_PWD
        script: |
          echo $REGISTRY_PWD | docker login registry.pocapi.in -u $REGISTRY_UNAME --password-stdin
          docker pull registry.pocapi.in/infano.api:latest
          cd /data/docker
          docker-compose -f infano.api.docker-compose.yml --env-file dev-global-variables.env up -d