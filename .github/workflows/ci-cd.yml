name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

env:
  IMAGE_NAME: registry.pocapi.in/infano.api

jobs:
  # ── CI: Lint · Typecheck · Build ─────────────────────────────────────────────
  ci:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ── CD: Build image → Push → Deploy ─────────────────────────────────────────
  # Only runs on push to master, after CI passes
  cd:
    name: Build · Push · Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: registry.pocapi.in
          username: ${{ secrets.REGISTRY_UNAME }}
          password: ${{ secrets.REGISTRY_PWD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_SERVER_IP }}
          username: root
          password: ${{ secrets.SSH_SERVER_PWD }}
          port: 22
          script: |
            set -e

            echo "📦 Pulling latest image..."
            docker pull registry.pocapi.in/infano.api:latest

            echo "🚀 Restarting service..."
            cd /data/docker
            docker-compose -f infano.api.docker-compose.yml --env-file dev-global-variables.env up -d

            echo "🔍 Running containers:"
            docker-compose -f infano.api.docker-compose.yml ps

            echo "🧹 Pruning unused images..."
            docker image prune -f

            echo "✅ Deployment complete"
