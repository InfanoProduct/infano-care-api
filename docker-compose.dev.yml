services:
  dev-api:
    image: registry.pocapi.in/infano.api:dev-latest
    container_name: infano-api-dev
    restart: always
    ports:
      - "8084:4000"
    # Unified environment management via .env file on the VPS
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Optional: ensure communication with other containers if needed
    # networks:
    #   - infano-net
