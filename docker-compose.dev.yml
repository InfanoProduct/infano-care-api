services:
  dev-api:
    image: registry.pocapi.in/infano.api:dev-latest
    container_name: infano-api-dev
    restart: always
    ports:
      - "8084:4000"
    # Unified environment management via .env file on the VPS
    env_file:
      - .env
    networks:
      - portal_network
    volumes:
      - ./uploads:/app/uploads
    logging:
      driver: gelf
      options:
        gelf-address: "udp://109.199.120.104:12201"
        tag: "infano-api-dev"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Optional: ensure communication with other containers if needed
    # networks:
    #   - infano-net

networks:
  portal_network:
    external: true
    name: docker_default
