services:
  api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/infano-care-api:latest
    container_name: infano-care-api
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
