services:
  prod-api:
    image: registry.pocapi.in/infano.api:prod-latest
    container_name: infano-api-prod
    restart: always
    ports:
      - "8085:4000"
    # Unified environment management via .env file on the VPS
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
